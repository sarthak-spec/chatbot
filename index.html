<!DOCTYPE html>
<html>
<head>
    <title>Smart FAQ Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
            padding: 50px;
        }

        .chat-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
            margin-bottom: 15px;
        }

        .message {
            margin: 5px 0;
        }

        .user {
            text-align: right;
            color: blue;
        }

        .bot {
            text-align: left;
            color: green;
        }

        form {
            display: flex;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #0078D7;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Smart FAQ Chatbot</h2>
        <div id="messages"></div>
        <form id="chat-form">
            <input type="text" id="question" placeholder="Ask your question..." required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const messages = document.getElementById('messages');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const input = document.getElementById('question');
            const question = input.value.trim();
            if (!question) return;

            messages.innerHTML += `<div class="message user">You: ${question}</div>`;
            input.value = '';

            const response = await fetch('/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'question=' + encodeURIComponent(question)
            });

            const data = await response.json();
            messages.innerHTML += `<div class="message bot">Bot: ${data.answer}</div>`;
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
